version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: finbank-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=seuemail@seudominio.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - finbank-network
    restart: unless-stopped

  app:
    build: .
    container_name: finbank-app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://finbank:finbank123@postgres:5432/finbank
      - JWT_SECRET=super-insecure-jwt-secret-change-me-in-prod
      - JWT_EXPIRES_IN=24h
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=5242880
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - finbank-network
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.finbank.rule=Host(`fintech.davidev.cloud`,`www.fintech.davidev.cloud`)
      - traefik.http.routers.finbank.entrypoints=websecure
      - traefik.http.routers.finbank.tls=true
      - traefik.http.routers.finbank.tls.certresolver=le
      - traefik.http.services.finbank.loadbalancer.server.port=3000
      - traefik.http.routers.finbank-http.rule=Host(`fintech.davidev.cloud`,`www.fintech.davidev.cloud`)
      - traefik.http.routers.finbank-http.entrypoints=web
      - traefik.http.routers.finbank-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

  postgres:
    image: postgres:15-alpine
    container_name: finbank-postgres
    environment:
      - POSTGRES_USER=finbank
      - POSTGRES_PASSWORD=finbank123
      - POSTGRES_DB=finbank
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbank"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finbank-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  finbank-network:
    driver: bridge