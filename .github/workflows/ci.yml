name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build local stack
        run: docker compose -f docker-compose-local.yml up -d --build

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health; then
              echo "App pronta"
              exit 0
            fi
            echo "Aguardando app..."
            sleep 5
          done
          echo "App não respondeu a tempo"
          docker compose -f docker-compose-local.yml logs
          exit 1

      - name: Smoke test - health
        run: curl -fsS http://localhost:3000/health

      - name: Smoke test - uploads writable
        run: |
          docker compose -f docker-compose-local.yml exec -T app sh -c 'test -w /app/uploads && touch /app/uploads/ci-test.txt && rm -f /app/uploads/ci-test.txt'

      - name: Check upload fixture exists
        run: ls -l tests/fixtures

      - name: Register test user and get token
        run: |
          EMAIL="ci$(date +%s)@test.com"

          echo "Registrando usuário: $EMAIL"

          REGISTER_CODE=$(curl -s -o /tmp/register-response.json -w "%{http_code}" \
            -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"CI User\",\"email\":\"$EMAIL\",\"password\":\"Teste@123\"}")

          echo "REGISTER STATUS: $REGISTER_CODE"
          echo "REGISTER BODY:"
          cat /tmp/register-response.json
          echo

          test "$REGISTER_CODE" = "200" -o "$REGISTER_CODE" = "201"

          TOKEN=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/register-response.json','utf8')); console.log(data.token || data.accessToken || (data.user && data.user.token) || '')")

          if [ -z \"$TOKEN\" ]; then
            echo "Token não encontrado na resposta do register"
            exit 1
          fi

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Smoke test - upload endpoint
        run: |
          echo "Testando upload autenticado..."
          code=$(curl -s -o /tmp/upload-response.txt -w "%{http_code}" \
            -X POST http://localhost:3000/api/uploads \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@tests/fixtures/teste.jpg")

          echo "STATUS: $code"
          echo "BODY:"
          cat /tmp/upload-response.txt
          echo

          test "$code" = "200" -o "$code" = "201"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose-local.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose-local.yml down -v
